language: bash

services:
  - docker

before_install:
#  - sudo apt-get update
#  - sudo apt-get -y install qemu-static binfmt
  - mkdir -vp ~/.docker/cli-plugins/
  - curl --silent -L "https://github.com/docker/buildx/releases/download/v0.5.1/buildx-v0.5.1.linux-amd64" > ~/.docker/cli-plugins/docker-buildx
  - chmod a+x ~/.docker/cli-plugins/docker-buildx

deploy:
  provider: script
  script: 
    bash ./build-docker.sh x86
    bash ./build-docker.sh armhf
    bash ./build-docker.sh arm64
  on:
    branch: master
